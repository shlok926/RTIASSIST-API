services:
  - type: web
    name: rtiassist-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_server.py
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ASI1_API_KEY
        sync: false
      - key: API_BASE
        value: https://visgrow-03-rtiassist-api.hf.space
      - key: WEBHOOK_URL
        sync: false
